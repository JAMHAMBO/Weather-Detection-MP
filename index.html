<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="sytle.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <div class="container1">
                <input type="text" class="searchBar" placeholder="Search Location">
                <button class="searchIcon">
                    <img src="images/search.png" alt="Search Bar">
                </button>
            </div>

            <div class="container2">
                <img src="images/clear.png" alt="Weather" class="weatherPNG">
            </div>

            <div class="container3">
                <div class="temp">22°c</div>
                <div class="location">Bengaluru</div>
            </div>

            <div class="container4">
                <div class="container4-1">

                    <img src="images/humidity.png" alt="humidityIMG" class="dIMG">

                    <div class="container4-1-1">

                        <div class="hValue">53%</div>
                        <div class="humidity">Humidity</div>

                    </div>

                </div>

                <div class="container4-2">

                    <img src="images/wind.png" alt="windIMG" class="dIMG">

                    <div class="container4-2-1">

                        <div class="wValue">5.66 km/h</div>
                        <div class="windSpeed">Wind Speed</div>

                    </div>

                </div>

            </div>


        </div>

    </div>
</body>
<script src="script.js"></script>

</html>
